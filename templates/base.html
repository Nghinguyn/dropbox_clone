<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dropbox Clone{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav {
            background: #0061ff;
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { font-size: 20px; }
        nav button {
            background: white;
            color: #0061ff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    </style>
</head>
<body>
    <nav>
        <h1>Dropbox Clone</h1>
        <div id="nav-auth">
            <button onclick="googleLogin()">Login with Google</button>
        </div>
    </nav>

    <!-- Loading overlay -->
    <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
        <div style="width:48px; height:48px; border:5px solid #e0e0e0; border-top-color:#0061ff; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
        <p id="loading-text" style="margin-top:16px; color:#0061ff; font-weight:bold;">Loading...</p>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='firebase-login.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
